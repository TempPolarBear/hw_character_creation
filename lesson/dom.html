<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Работа с DOM</title>

<style>
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
    }

    input {
        padding: 8px;
    }

    button {
        margin-top: 10px;
        margin-right: 10px;
        padding: 8px 15px;
    }

    #output {
        margin-left: 10px;
        font-weight: bold;
    }

    .active {
        background-color: #4CAF50;
        color: white;
        padding: 10px;
        border-radius: 5px;
    }
</style>

</head>
<body>

<h2>Работа с DOM</h2>

<input type="text" id="nameInput" placeholder="Введите текст">
<span id="output"></span>

<br><br>

<button id="changeColor" onclick="changeColor()">
    Изменить цвет
</button>

<button id="classButton">
    Переключить класс
</button>

<p id="message">
    Этот текст будет изменяться.
</p>

<script>
    // Логика считывания значения из input и отображения его в span
    // Получаем элементы по их идентификаторам
    const input = document.getElementById("nameInput");
    const output = document.getElementById("output");
    // Добавляем обработчик события для изменения текста при вводе
    input.addEventListener("click", function () {
        output.textContent = input.value;
    });

    // Логика изменения цвета текста при нажатии на кнопку
    const message = document.getElementById("message");
    const classButton = document.getElementById("classButton");
    // Функция для изменения цвета текста
    function changeColor() {
        message.style.color = "red";
        message.style.fontSize = "24px";
    }
    // Логика переключения класса при нажатии на кнопку
    classButton.addEventListener("click", function () {
        message.classList.toggle("active");
    });
</script>

</body>
</html>
